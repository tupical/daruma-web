[module]
name         = "taskagent-web"
kind         = "client"
status       = "shipped"
owner        = "clients"
contract     = "/v1/* + WS"
contract_min = "v1"
repo_path    = "taskagent-web (standalone repo)"
runtime      = "Rust/WASM (Leptos 0.7, csr)"
read_only    = true

[core]
source       = "git"
repo         = "https://github.com/tupical/taskagent"
version      = "0.1.0"
tag          = "taskagent-v0.1.0"
dev_override = "vendor/oss -> ../taskagent"

[capabilities]
needs = [
  "TaskRead",
  "CommentRead",
  "ProjectRead",
  "PlanRead",
  "RunRead",
  "EventRead",
  "WsConnect",
  "DocumentRead",
  "TaskRelationRead",
]
optional = []

[build]
tool    = "trunk"
profile = "release"
out_dir = "dist"

[serve]
# Standalone repo: the OSS server no longer serves this UI. The dist/ bundle is
# deployed behind any static host and points at the API server's /v1/* + /v1/ws.
mode    = "static"
mount   = "any static host"
