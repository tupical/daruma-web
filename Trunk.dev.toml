# Local dev overrides — assets served from `/` so http://127.0.0.1:5174/
# works. Production/release builds keep `Trunk.toml` public_url = `/web/`.
#
# Usage:
#   trunk serve --config Trunk.dev.toml
#   ./scripts/dev-stack.sh print-url

[build]
public_url = "/"

[serve]
addresses = ["127.0.0.1"]
port = 5174

[[proxy]]
backend = "http://127.0.0.1:8080/v1/"
rewrite = "/v1/"

[[proxy]]
backend = "http://127.0.0.1:8080/.well-known/daruma-shell.json"
rewrite = "/.well-known/daruma-shell.json"

[[proxy]]
backend = "http://127.0.0.1:8080/workspaces"
rewrite = "/workspaces"

[[proxy]]
backend = "ws://127.0.0.1:8080/v1/ws"
rewrite = "/v1/ws"
ws = true
