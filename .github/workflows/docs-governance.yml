name: Docs decision governance

on:
  pull_request:
    paths: ["**/*.md", "**/*.mdx"]
  push:
    branches: [main]
    paths: ["**/*.md", "**/*.mdx"]
  workflow_dispatch:

jobs:
  decisions:
    uses: tupical/meisei.ru/.github/workflows/docs-decision-governance.yml@main
    with:
      base_sha: ${{ github.event.pull_request.base.sha || github.event.before }}

